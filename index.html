<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arvin — CX & Product Design Leader</title>
<style>
@font-face { font-family: 'Sofia Pro'; src: url('fonts/SofiaPro-Regular.otf') format('opentype'); font-weight: 400; }
@font-face { font-family: 'Sofia Pro'; src: url('fonts/SofiaPro-Bold.otf') format('opentype'); font-weight: 700; }
@font-face { font-family: 'Lato'; src: url('fonts/Lato-Light.ttf') format('truetype'); font-weight: 300; }
@font-face { font-family: 'Lato'; src: url('fonts/Lato-Regular.ttf') format('truetype'); font-weight: 400; }
@font-face { font-family: 'Founders Grotesk Mono'; src: url('fonts/TestFoundersGroteskMono-Regular.otf') format('opentype'); font-weight: 400; }
@font-face { font-family: 'Founders Grotesk Mono'; src: url('fonts/TestFoundersGroteskMono-Light.otf') format('opentype'); font-weight: 300; }

:root {
  --color-white: #FFFFFF;
  --color-charcoal: #312F32;
  --color-ivory: #FFFEF2;
  --color-lime: #7AE04D;
  --accent: #7AE04D;
  --font-display: 'Sofia Pro', sans-serif;
  --font-body: 'Lato', sans-serif;
  --font-mono: 'Founders Grotesk Mono', monospace;
  --ease-out: cubic-bezier(0.16,1,0.3,1);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--color-ivory);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 0 24px 80px;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(49,47,50,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(49,47,50,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ─── Deck layout ─── */
.deck-area {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 420px;
  max-width: 100%;
  z-index: 1;
}

/* Lanyard — always visible */
.deck-lanyard {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  flex-shrink: 0;
  height: 168px;
  overflow: hidden;
}

.ribbon {
  width: 50px;
  flex: 1;
  background: linear-gradient(
    to bottom,
    rgba(49,47,50,0) 0%,
    rgba(49,47,50,0.18) 20%,
    rgba(49,47,50,0.22) 45%,
    color-mix(in srgb, var(--accent) 35%, transparent) 50%,
    rgba(49,47,50,0.22) 55%,
    rgba(49,47,50,0.18) 80%,
    rgba(49,47,50,0.28) 100%
  );
  border-left: 1px solid rgba(255,255,255,0.06);
  border-right: 1px solid rgba(255,255,255,0.06);
}
.clip {
  width: 60px;
  height: 20px;
  background: rgba(49,47,50,0.15);
  border: 1px solid rgba(49,47,50,0.2);
  border-radius: 4px 4px 0 0;
  position: relative;
  backdrop-filter: blur(4px);
  flex-shrink: 0;
}
.clip::after {
  content: '';
  position: absolute;
  top: 6px; left: 50%;
  transform: translateX(-50%);
  width: 20px; height: 8px;
  background: rgba(49,47,50,0.25);
  border-radius: 2px;
}

/* Stack container */
.deck-stack {
  position: relative;
  width: 100%;
  transition: height 0.45s var(--ease-out);
  /* Allow 80px below for active card box-shadow; side overflow for exit animations */
  clip-path: inset(0px -100vw -80px -100vw);
}

/* Gradient mask that fades behind-card bleed in the shadow zone to ivory */
.deck-stack::after {
  content: '';
  position: absolute;
  bottom: -80px;
  left: -40px;
  right: -40px;
  height: 80px;
  background: linear-gradient(to bottom, transparent 0%, var(--color-ivory) 55%);
  pointer-events: none;
  z-index: 11; /* above behind-cards (z:8,9) and active card (z:10); positioned below active card bottom so it never covers card content */
}

/* All cards sit in the stack */
.deck-card {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  transform-origin: center top;
  transition:
    transform 0.45s var(--ease-out),
    opacity 0.35s ease;
  will-change: transform, opacity;
  user-select: none;
  -webkit-user-select: none;
}

/* ── Deck states ── */
.deck-card.s-active {
  z-index: 10;
  transform: translateX(0) translateY(0) rotate(0deg) scale(1);
  opacity: 1;
  cursor: default;
}

/* Cards ahead → peek from the right */
.deck-card.s-right-1 {
  z-index: 9;
  transform: translateX(14px) scale(0.97);
  opacity: 0.22;
  pointer-events: none;
}
.deck-card.s-right-2 {
  z-index: 8;
  transform: translateX(24px) scale(0.94);
  opacity: 0.10;
  pointer-events: none;
}

/* Cards already seen → peek from the left */
.deck-card.s-left-1 {
  z-index: 9;
  transform: translateX(-14px) scale(0.97);
  opacity: 0.22;
  pointer-events: none;
}
.deck-card.s-left-2 {
  z-index: 8;
  transform: translateX(-24px) scale(0.94);
  opacity: 0.10;
  pointer-events: none;
}

.deck-card.s-hidden {
  z-index: 0;
  transform: translateX(0) scale(0.92);
  opacity: 0;
  pointer-events: none;
}

/* Exit animations (override transition timing) */
.deck-card.s-exit-left {
  z-index: 11;
  transform: translateX(-115%) rotate(-6deg) !important;
  opacity: 0 !important;
  transition:
    transform 0.38s cubic-bezier(0.4, 0, 0.8, 0.2),
    opacity 0.28s ease !important;
  pointer-events: none;
}
.deck-card.s-exit-right {
  z-index: 11;
  transform: translateX(115%) rotate(6deg) !important;
  opacity: 0 !important;
  transition:
    transform 0.38s cubic-bezier(0.4, 0, 0.8, 0.2),
    opacity 0.28s ease !important;
  pointer-events: none;
}

/* ── Card anatomy (same for all) ── */
.card {
  background: var(--color-charcoal);
  border-radius: 16px;
  overflow: hidden;
  position: relative;
  height: 650px; /* fixed height — all cards uniform */
  box-shadow:
    0 2px 0 rgba(255,255,255,0.08) inset,
    0 40px 80px rgba(49,47,50,0.3),
    0 8px 24px rgba(49,47,50,0.18);
}
.card::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
  opacity: 0.4;
  pointer-events: none;
  z-index: 1;
}

.shape-bg { position: absolute; pointer-events: none; z-index: 0; }
.shape-1  { width: 280px; height: 280px; top: -80px; right: -80px; opacity: 0.06; }
.shape-2  { width: 200px; height: 200px; bottom: -40px; left: -60px; opacity: 0.08; transform: rotate(45deg); }

.card-inner {
  position: relative;
  z-index: 2;
  padding: 28px 30px 32px;
  height: 100%;
  display: flex;
  flex-direction: column;
  box-sizing: border-box;
}

.card-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 20px;
}
.access-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.22em;
  color: var(--accent);
  text-transform: uppercase;
  padding: 3px 0 0;
  line-height: 1.6;
}
.card-id {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.45);
  text-align: right;
  line-height: 1.8;
}

.rule {
  height: 1px;
  background: rgba(255,255,255,0.08);
  margin-bottom: 20px;
}

.meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  margin-bottom: 16px;
  flex-shrink: 0;
}
.meta-field { padding: 0 0 14px; }
.meta-field:nth-child(odd)  { padding-right: 24px; border-right: 1px solid rgba(255,255,255,0.06); }
.meta-field:nth-child(even) { padding-left: 24px; }
.meta-label {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  margin-bottom: 4px;
}
.meta-value {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 400;
  color: rgba(255,255,255,0.75);
  line-height: 1.5;
}
.meta-company {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-wrap: wrap;
}
.company-logo {
  height: 13px;
  width: auto;
  max-width: 48px;
  object-fit: contain;
  filter: brightness(0) invert(1);
  opacity: 0.7;
  flex-shrink: 0;
}
.company-logo-svg {
  height: 14px;
  width: auto;
  flex-shrink: 0;
  opacity: 0.65;
}

.name-block { margin-bottom: 20px; flex-shrink: 0; }
.name-display {
  font-family: var(--font-display);
  font-size: 31px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--color-white);
  line-height: 1;
  text-transform: uppercase;
  padding: 4px 0 0;
  white-space: nowrap;
}
.name-display-job {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--color-white);
  line-height: 1.05;
  text-transform: uppercase;
  padding: 4px 0 0;
}

.bio-section {
  border-top: 1px solid rgba(255,255,255,0.08);
  padding-top: 18px;
  /* flex: grow to fill remaining height, clip gracefully */
  flex: 1;
  min-height: 0;
  overflow: hidden;
  position: relative;
}
/* Gradient fade so clipped bio text dissolves rather than hard-cuts */
.bio-section::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 32px;
  background: linear-gradient(transparent, var(--color-charcoal));
  pointer-events: none;
}
.bio-text {
  font-family: var(--font-body);
  font-size: 13.5px;
  font-weight: 400;
  color: rgba(255,255,255,0.55);
  line-height: 1.75;
  letter-spacing: 0.3px;
  text-wrap: pretty;
}
.bio-text + .bio-text { margin-top: 10px; }

/* Tags always pinned to the bottom of the card */
.spec-row { display: flex; flex-wrap: wrap; gap: 5px; flex-shrink: 0; padding-top: 16px; }
.spec-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: color-mix(in srgb, var(--accent) 75%, transparent);
  border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
  border-radius: 2px;
  padding: 4px 8px;
}

/* ── Navigation ── */
.deck-nav {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-top: 28px;
  position: relative;
  z-index: 20;
}
.deck-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid rgba(49,47,50,0.18);
  background: rgba(255,254,242,0.9);
  color: var(--color-charcoal);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  flex-shrink: 0;
}
.deck-btn:hover {
  background: rgba(255,254,242,1);
  border-color: rgba(49,47,50,0.3);
  transform: scale(1.06);
}
.deck-btn:active { transform: scale(0.95); }
.deck-btn:disabled { opacity: 0.3; cursor: default; transform: none; }
.deck-btn svg { pointer-events: none; }

.deck-counter {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.2em;
  color: rgba(49,47,50,0.4);
  min-width: 36px;
  text-align: center;
}

/* ── Entry animation ── */
@keyframes rise {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.deck-area { animation: rise 0.6s var(--ease-out) both; }
</style>
</head>
<body>

<div class="deck-area">

  <!-- Lanyard (visible for hero card only, hidden by JS for others) -->
  <div class="deck-lanyard" id="deck-lanyard">
    <div class="ribbon"></div>
    <div class="clip"></div>
  </div>

  <!-- ── Card stack — populated from content.js ── -->
  <div class="deck-stack" id="deck-stack"></div><!-- /deck-stack -->

  <!-- Navigation -->
  <div class="deck-nav">
    <button class="deck-btn" id="btn-prev" aria-label="Previous card">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M11 4L6 9L11 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span class="deck-counter" id="deck-counter">1 / 6</span>
    <button class="deck-btn" id="btn-next" aria-label="Next card">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M7 4L12 9L7 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

</div><!-- /deck-area -->

<!-- All copy lives in content.js — edit that file to update the site -->
<script src="content.js"></script>
<script>
(function () {
  /* ── Render cards from content.js data ───────────────────────── */
  function nl2br(s) { return s.replace(/\n/g, '<br>'); }

  function renderLogo(logo) {
    if (!logo) return '';
    if (logo.type === 'img')
      return `<img class="company-logo" src="${logo.src}" alt="${logo.alt}" onerror="this.style.display='none'">`;
    return logo.markup; // inline svg
  }

  (function renderCards() {
    const stack = document.getElementById('deck-stack');
    stack.innerHTML = CARDS.map(card => {
      const accentAttr = card.accent !== '#7AE04D' ? ` style="--accent:${card.accent};"` : '';
      const shapes = card.shapes.map(s =>
        `<div class="shape-bg ${s.cls}"><img src="${s.src}" style="width:100%;height:100%;filter:invert(1);" alt=""></div>`
      ).join('');
      const meta = card.meta.map(f => {
        const val = f.logo
          ? `<div class="meta-value meta-company">${renderLogo(f.logo)}<span>${f.value}</span></div>`
          : `<div class="meta-value">${nl2br(f.value)}</div>`;
        return `<div class="meta-field"><div class="meta-label">${f.label}</div>${val}</div>`;
      }).join('');
      const bio  = card.bio.map(p => `<p class="bio-text">${p}</p>`).join('');
      const tags = card.tags.map(t => `<span class="spec-tag">${t}</span>`).join('');
      return `<div class="deck-card" id="${card.id}"${accentAttr}><div class="card">${shapes}<div class="card-inner"><div class="card-header"><div class="access-label">${nl2br(card.accessLabel)}</div><div class="card-id">${nl2br(card.cardId)}</div></div><div class="rule"></div><div class="meta-grid">${meta}</div><div class="name-block"><div class="${card.nameClass}">${card.name}</div></div><div class="bio-section">${bio}</div><div class="spec-row">${tags}</div></div></div></div>`;
    }).join('');
  })();

  const TOTAL = CARDS.length;
  const PEEK  = 0; // no bottom overflow — side peek only
  const EXIT_DURATION = 400; // ms

  let current    = 0;
  let isAnimating = false;

  const stack   = document.getElementById('deck-stack');
  const counter = document.getElementById('deck-counter');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  const cards   = Array.from({ length: TOTAL }, (_, i) => document.getElementById('card-' + i));

  /* ── State helpers ── */
  function stateFor(cardIndex, activeIndex) {
    if (cardIndex === activeIndex) return 's-active';
    const fwd = (cardIndex - activeIndex + TOTAL) % TOTAL; // steps ahead
    const bwd = (activeIndex - cardIndex + TOTAL) % TOTAL; // steps behind
    // Cards ahead → right; cards behind → left
    if (fwd <= bwd) {
      if (fwd === 1) return 's-right-1';
      if (fwd === 2) return 's-right-2';
    } else {
      if (bwd === 1) return 's-left-1';
      if (bwd === 2) return 's-left-2';
    }
    return 's-hidden';
  }

  function clearStates(card) {
    card.classList.remove(
      's-active', 's-right-1', 's-right-2', 's-left-1', 's-left-2',
      's-hidden', 's-exit-left', 's-exit-right'
    );
  }

  function setContainerHeight() {
    // All cards are a fixed 650px — set once
    stack.style.height = '650px';
  }

  function updateCounter(idx) {
    counter.textContent = (idx + 1) + ' / ' + TOTAL;
  }

  function applyAllStates(activeIdx) {
    cards.forEach((card, i) => {
      clearStates(card);
      card.classList.add(stateFor(i, activeIdx));
    });
    setContainerHeight();
    updateCounter(activeIdx);
  }

  /* ── Navigate ── */
  function navigate(dir) {
    if (isAnimating) return;
    isAnimating = true;

    const exitClass = dir === 'next' ? 's-exit-left' : 's-exit-right';
    const newIndex  = dir === 'next'
      ? (current + 1) % TOTAL
      : (current - 1 + TOTAL) % TOTAL;

    // Exit current card
    clearStates(cards[current]);
    cards[current].classList.add(exitClass);

    // Shift remaining cards toward their new positions immediately
    cards.forEach((card, i) => {
      if (i === current) return;
      clearStates(card);
      card.classList.add(stateFor(i, newIndex));
    });

    // Resize container to incoming card
    setContainerHeight();
    updateCounter(newIndex);

    // After exit animation, reset exited card to hidden
    setTimeout(() => {
      clearStates(cards[current]);
      cards[current].classList.add(stateFor(current, newIndex));
      current = newIndex;
      isAnimating = false;
    }, EXIT_DURATION);
  }

  /* ── Arrow buttons ── */
  btnPrev.addEventListener('click', () => navigate('prev'));
  btnNext.addEventListener('click', () => navigate('next'));

  /* ── Keyboard ── */
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') navigate('next');
    if (e.key === 'ArrowLeft')  navigate('prev');
  });

  /* ── Touch / swipe ── */
  let touchStartX = 0;
  let touchStartY = 0;
  let isDragging  = false;

  stack.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    isDragging  = true;
  }, { passive: true });

  stack.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    // Prevent page scroll if horizontal swipe
    if (Math.abs(dx) > Math.abs(dy)) e.preventDefault();
  }, { passive: false });

  stack.addEventListener('touchend', e => {
    if (!isDragging) return;
    isDragging = false;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 48) {
      navigate(dx < 0 ? 'next' : 'prev');
    }
  }, { passive: true });

  /* ── Init ── */
  // Wait for fonts/layout then set initial height
  requestAnimationFrame(() => {
    setTimeout(() => {
      applyAllStates(0);
    }, 50);
  });

  window.addEventListener('resize', () => setContainerHeight());
})();
</script>
</body>
</html>
